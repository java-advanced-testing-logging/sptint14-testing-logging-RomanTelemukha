<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/template}"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create State</title>
</head>
<body>

<div layout:fragment="content" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h2 class="text-center mb-4">Create State</h2>

            <form th:action="@{/states/create}" th:object="${state}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label">State Name</label>
                    <input type="text"
                           id="name"
                           class="form-control"
                           th:field="*{name}"
                           placeholder="Enter state name">

                    <div class="invalid-feedback d-block">
                        <span th:if="${#fields.hasErrors('name')}"
                              th:errors="*{name}"></span>
                    </div>
                </div>

                <div class="text-center">
                    <button type="reset" class="btn btn-outline-secondary me-2">Clear</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>

            </form>

            <div class="text-center mt-3">
                <a th:href="@{/states}">Go back to list</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
